<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CredStellar - QR Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "outline-variant": "#c8c5d0",
                      "surface-container-high": "#e7e8e9",
                      "tertiary": "#000000",
                      "on-tertiary-container": "#32963b",
                      "on-secondary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-fixed": "#002204",
                      "outline": "#78767f",
                      "surface-dim": "#d9dadb",
                      "inverse-surface": "#2e3132",
                      "on-primary-fixed-variant": "#43426f",
                      "background": "#f8f9fa",
                      "surface-container-highest": "#e1e3e4",
                      "surface-bright": "#f8f9fa",
                      "secondary-fixed": "#dce1ff",
                      "inverse-on-surface": "#f0f1f2",
                      "on-primary": "#ffffff",
                      "inverse-primary": "#c3c1f7",
                      "error": "#ba1a1a",
                      "on-secondary-container": "#fffbff",
                      "secondary-fixed-dim": "#b6c4ff",
                      "on-secondary-fixed-variant": "#003ab2",
                      "primary": "#000000",
                      "on-error-container": "#93000a",
                      "tertiary-fixed-dim": "#78dc77",
                      "surface-container": "#edeeef",
                      "on-error": "#ffffff",
                      "primary-fixed-dim": "#c3c1f7",
                      "on-tertiary-fixed-variant": "#005313",
                      "surface-variant": "#e1e3e4",
                      "tertiary-container": "#002204",
                      "surface": "#f8f9fa",
                      "on-secondary-fixed": "#001550",
                      "primary-container": "#171641",
                      "surface-tint": "#5a5a88",
                      "on-surface": "#191c1d",
                      "on-primary-fixed": "#171641",
                      "on-tertiary": "#ffffff",
                      "secondary": "#1a4fd6",
                      "surface-container-low": "#f3f4f5",
                      "tertiary-fixed": "#94f990",
                      "on-surface-variant": "#47464e",
                      "error-container": "#ffdad6",
                      "on-primary-container": "#807fb0",
                      "on-background": "#191c1d",
                      "secondary-container": "#3e6af0",
                      "primary-fixed": "#e2dfff"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Manrope", "sans-serif"],
                      "body": ["Inter", "sans-serif"],
                      "label": ["Inter", "sans-serif"]
              }
            }
          }
        }
    </script>
<style>
        /* Hide scrollbar for cleaner look on full screen apps */
        body { scrollbar-width: none; -ms-overflow-style: none; }
        body::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface h-screen flex flex-col pb-28">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-[#f8f9fa] dark:bg-[#080633] shadow-[0_8px_30px_rgb(0,0,0,0.04)] z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
<!-- Close/Back Action (Task-focused departure) -->
<button aria-label="Close Scanner" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#e7e8e9] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#080633] dark:text-[#f3f4f5]" data-icon="close">close</span>
</button>
<!-- Headline -->
<h1 class="font-manrope font-extrabold text-[#080633] dark:text-white tracking-tighter text-2xl">CredStellar</h1>
<!-- Trailing (Hidden or placeholder to balance flex-between) -->
<div class="w-10 h-10"></div>
</div>
</header>
<!-- Main Scanner Canvas -->
<main class="flex-1 relative bg-primary overflow-hidden flex flex-col items-center justify-center">
<!-- Camera Feed Background (Simulated) -->
<img alt="Camera feed background" class="absolute inset-0 w-full h-full object-cover opacity-60" data-alt="blurred indoor office setting looking down at a wooden desk with a subtle warm glow representing a camera viewfinder feed" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCpOuqWYADjBy9Vsma8DyHQg5KI-GlpxTwko_2RGjZwcq3wK1bHs3GfUhmmsC4i-TqkV8F6I4nRvDiGqR7rUz696M7pwgTjUSyNqBg6UgSsEyokEB5UX0i9qwJ0B40dk8QKbsJfJG4WATuwbGZc5bT2zEbmGl858a0SsWEHBU_gZZDVux_IVu7aq2ytaqEyMR1ywzbUAlKzphCCB7Qxu6RrsRgt89YUz9FyK96xoKAut0Vkd83dY7ZNGhyqxmeeLVhg4C-cA194Bcw"/>
<!-- Dark Overlay (Simulating camera mask, leaving center clearer) -->
<div class="absolute inset-0 bg-primary/40 backdrop-blur-[2px]"></div>
<!-- Viewfinder Focus Area -->
<div class="relative w-72 h-72 z-10 flex items-center justify-center">
<!-- Cutout effect (clearer center) -->
<div class="absolute inset-0 bg-black/10 shadow-[0_0_0_4000px_rgba(0,0,0,0.6)] rounded-xl"></div>
<!-- Scanning Animation Line -->
<div class="absolute top-0 left-0 w-full h-0.5 bg-secondary shadow-[0_0_12px_rgba(26,79,214,0.8)] animate-[scan_2.5s_ease-in-out_infinite]"></div>
<style>
                @keyframes scan {
                    0%, 100% { top: 0%; opacity: 0; }
                    10%, 90% { opacity: 1; }
                    50% { top: 100%; }
                }
            </style>
<!-- Bracket Graphics (No solid borders rule -> using colored divs) -->
<!-- Top Left -->
<div class="absolute top-[-2px] left-[-2px] w-8 h-1 bg-secondary rounded-full"></div>
<div class="absolute top-[-2px] left-[-2px] w-1 h-8 bg-secondary rounded-full"></div>
<!-- Top Right -->
<div class="absolute top-[-2px] right-[-2px] w-8 h-1 bg-secondary rounded-full"></div>
<div class="absolute top-[-2px] right-[-2px] w-1 h-8 bg-secondary rounded-full"></div>
<!-- Bottom Left -->
<div class="absolute bottom-[-2px] left-[-2px] w-8 h-1 bg-secondary rounded-full"></div>
<div class="absolute bottom-[-2px] left-[-2px] w-1 h-8 bg-secondary rounded-full"></div>
<!-- Bottom Right -->
<div class="absolute bottom-[-2px] right-[-2px] w-8 h-1 bg-secondary rounded-full"></div>
<div class="absolute bottom-[-2px] right-[-2px] w-1 h-8 bg-secondary rounded-full"></div>
</div>
<!-- Bottom Controls & Instructions -->
<div class="absolute bottom-12 left-0 w-full flex flex-col items-center gap-8 z-20 px-6">
<!-- Instructional Pill -->
<div class="bg-surface-container-lowest/95 backdrop-blur-xl px-6 py-3 rounded-full shadow-[0_8px_32px_rgba(0,0,0,0.12)]">
<p class="font-body text-sm font-semibold text-on-surface tracking-wide">
                    Scan any UPI or CredStellar QR to pay
                </p>
</div>
<!-- Action Buttons -->
<div class="flex gap-8">
<!-- Flashlight -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container-lowest/20 backdrop-blur-md flex items-center justify-center text-on-secondary transition-all active:scale-95 group-hover:bg-surface-container-lowest/30">
<span class="material-symbols-outlined text-3xl" data-icon="flashlight_on">flashlight_on</span>
</div>
</button>
<!-- Gallery -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-surface-container-lowest/20 backdrop-blur-md flex items-center justify-center text-on-secondary transition-all active:scale-95 group-hover:bg-surface-container-lowest/30">
<span class="material-symbols-outlined text-3xl" data-icon="image">image</span>
</div>
</button>
</div>
</div>
</main>
<!-- BottomNavBar Suppressed: Task-focused screen with a Close/Back action. -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-[#080633]/80 backdrop-blur-xl rounded-t-3xl border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.08)]">
<!-- Dashboard (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#1a4fd6] dark:hover:text-blue-300 transition-all font-inter text-[11px] font-semibold uppercase tracking-wider press-down-bounce-effect">
<span class="material-symbols-outlined mb-1">dashboard</span>
            Dashboard
        </button>
<!-- Credit (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#1a4fd6] dark:hover:text-blue-300 transition-all font-inter text-[11px] font-semibold uppercase tracking-wider press-down-bounce-effect">
<span class="material-symbols-outlined mb-1">account_balance_wallet</span>
            Credit
        </button>
<!-- Scan (Active) -->
<button class="flex flex-col items-center justify-center bg-[#f3f4f5] dark:bg-[#171641] text-[#080633] dark:text-white rounded-2xl px-5 py-2 font-inter text-[11px] font-semibold uppercase tracking-wider Active: scale-95 duration-200">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
            Scan
        </button>
<!-- History (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-[#1a4fd6] dark:hover:text-blue-300 transition-all font-inter text-[11px] font-semibold uppercase tracking-wider press-down-bounce-effect">
<span class="material-symbols-outlined mb-1">receipt_long</span>
            History
        </button>
</nav></body></html>
